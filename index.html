<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نقدك حكم - دورة مركز شباب تندة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0f1e, #1a2639);
            min-height: 100vh;
            color: #e5e7eb;
        }

        /* الهيدر الاحترافي */
        .header {
            background: linear-gradient(165deg, #0b1e1c, #1a2f2a);
            padding: 40px 20px 60px;
            text-align: center;
            position: relative;
            overflow: hidden;
            border-bottom: 1px solid rgba(251, 191, 36, 0.3);
        }

        .header::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(251, 191, 36, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .header::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, transparent, #fbbf24, #f59e0b, #fbbf24, transparent);
        }

        .tournament-title {
            font-size: 4.5em;
            font-weight: 900;
            background: linear-gradient(135deg, #fbbf24, #f59e0b, #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 10px 30px rgba(251, 191, 36, 0.3);
            margin-bottom: 15px;
            letter-spacing: 2px;
            line-height: 1.2;
            position: relative;
            display: inline-block;
            animation: titleFloat 3s ease-in-out infinite;
        }

        @keyframes titleFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .welcome-light {
            font-size: 2.2em;
            color: #ffffff;
            margin: 15px 0 10px;
            text-shadow: 0 0 20px rgba(251, 191, 36, 0.5);
            position: relative;
            display: inline-block;
            padding: 10px 40px;
        }

        .welcome-light span {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: bold;
        }

        .header h1 {
            font-size: 3em;
            margin: 20px 0 10px;
            color: #ffffff;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .header h1 span {
            color: #fbbf24;
            position: relative;
            display: inline-block;
        }

        .header h1 span::after {
            content: "";
            position: absolute;
            bottom: -5px;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #fbbf24, transparent);
        }

        .ramadan-decoration {
            font-size: 1.3em;
            color: #fcd34d;
            margin-top: 10px;
            opacity: 0.9;
        }

        /* المحتوى الرئيسي */
        .container {
            max-width: 1400px;
            margin: -30px auto 30px;
            padding: 0 25px;
            position: relative;
            z-index: 10;
        }

        /* قسم إضافة نقد جديد - احترافي */
        .add-criticism {
            background: rgba(18, 25, 35, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px;
            margin-bottom: 40px;
            border: 1px solid rgba(251, 191, 36, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(251, 191, 36, 0.1) inset;
            transition: all 0.3s;
        }

        .add-criticism:hover {
            border-color: rgba(251, 191, 36, 0.4);
            box-shadow: 0 30px 60px -12px rgba(251, 191, 36, 0.2);
        }

        .add-criticism h2 {
            color: #fbbf24;
            margin-bottom: 30px;
            font-size: 2.2em;
            font-weight: 600;
            position: relative;
            display: inline-block;
        }

        .add-criticism h2::after {
            content: "";
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 60%;
            height: 3px;
            background: linear-gradient(90deg, #fbbf24, transparent);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: #d1d5db;
            font-weight: 500;
            font-size: 1em;
            letter-spacing: 0.5px;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255,255,255,0.03);
            border: 1.5px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            color: white;
            font-size: 1em;
            transition: all 0.3s;
        }

        .form-group input:hover, .form-group select:hover, .form-group textarea:hover {
            border-color: rgba(251, 191, 36, 0.3);
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: #fbbf24;
            background: rgba(251, 191, 36, 0.05);
            box-shadow: 0 0 0 4px rgba(251, 191, 36, 0.1);
        }

        .form-group textarea {
            height: 120px;
            resize: vertical;
        }

        .form-group select option {
            background: #1a2639;
            color: white;
        }

        .btn-submit {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: #0a0f1e;
            border: none;
            padding: 16px 50px;
            font-size: 1.2em;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 10px 20px -5px rgba(251, 191, 36, 0.3);
            letter-spacing: 0.5px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 30px -5px rgba(251, 191, 36, 0.4);
            border-color: rgba(255,255,255,0.3);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        /* قسم عرض الانتقادات - احترافي */
        .criticisms-section {
            background: rgba(18, 25, 35, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px;
            border: 1px solid rgba(251, 191, 36, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .section-header h2 {
            color: #ffffff;
            font-size: 2.2em;
            font-weight: 600;
            position: relative;
            padding-right: 20px;
        }

        .section-header h2::before {
            content: "";
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 6px;
            height: 40px;
            background: linear-gradient(180deg, #fbbf24, #f59e0b);
            border-radius: 3px;
        }

        .filter-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: rgba(255,255,255,0.03);
            border: 1.5px solid rgba(251, 191, 36, 0.2);
            color: #d1d5db;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.95em;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .filter-btn:hover {
            background: rgba(251, 191, 36, 0.1);
            border-color: #fbbf24;
            color: #ffffff;
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            border-color: transparent;
            color: #0a0f1e;
            font-weight: 600;
        }

        .criticisms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        .criticism-card {
            background: rgba(255,255,255,0.02);
            border-radius: 24px;
            padding: 25px;
            transition: all 0.3s;
            border: 1px solid rgba(251, 191, 36, 0.1);
            position: relative;
            overflow: hidden;
        }

        .criticism-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #fbbf24, #f59e0b, transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .criticism-card:hover {
            transform: translateY(-5px) scale(1.02);
            background: rgba(255,255,255,0.05);
            border-color: rgba(251, 191, 36, 0.3);
            box-shadow: 0 20px 40px -15px rgba(251, 191, 36, 0.2);
        }

        .criticism-card:hover::before {
            opacity: 1;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .match-number {
            background: linear-gradient(135deg, #fbbf2420, #f59e0b20);
            color: #fbbf24;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.9em;
            font-weight: 600;
            border: 1px solid #fbbf2440;
        }

        .criticism-type {
            background: rgba(255,255,255,0.05);
            padding: 6px 15px;
            border-radius: 40px;
            font-size: 0.85em;
            color: #fbbf24;
            border: 1px solid rgba(251, 191, 36, 0.2);
        }

        .criticism-text {
            font-size: 1.2em;
            line-height: 1.6;
            margin: 20px 0;
            color: #f3f4f6;
            font-style: italic;
            padding: 0 10px;
        }

        .criticism-text::before {
            content: '"';
            font-size: 2em;
            color: #fbbf24;
            margin-left: 5px;
            opacity: 0.5;
        }

        .criticism-text::after {
            content: '"';
            font-size: 2em;
            color: #fbbf24;
            margin-right: 5px;
            opacity: 0.5;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.05);
            color: #9ca3af;
            font-size: 0.9em;
        }

        .votes {
            display: flex;
            gap: 20px;
        }

        .vote-btn {
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            font-size: 1em;
            padding: 5px 10px;
            border-radius: 30px;
        }

        .vote-btn:hover {
            background: rgba(255,255,255,0.05);
            color: #fbbf24;
        }

        .vote-btn.upvoted {
            color: #10b981;
        }

        .vote-btn.upvoted:hover {
            color: #059669;
        }

        .vote-btn.downvoted {
            color: #ef4444;
        }

        .vote-btn.downvoted:hover {
            color: #dc2626;
        }

        /* رسالة التأكيد - احترافية */
        .toast-message {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #1e2b3a, #0f172a);
            color: white;
            padding: 16px 32px;
            border-radius: 60px;
            font-weight: 500;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 0 1px #fbbf24;
            transform: translateY(150px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(251, 191, 36, 0.3);
        }

        .toast-message.show {
            transform: translateY(0);
            opacity: 1;
        }

        /* تذييل احترافي */
        .footer {
            text-align: center;
            padding: 40px;
            color: #9ca3af;
            border-top: 1px solid rgba(251, 191, 36, 0.1);
            margin-top: 60px;
            background: linear-gradient(0deg, #0a0f1e, transparent);
            position: relative;
        }

        .footer::before {
            content: "";
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #fbbf24, transparent);
        }

        .footer .tenda-signature {
            color: #fbbf24;
            font-size: 1.3em;
            font-weight: bold;
            margin: 10px 0;
            text-shadow: 0 0 10px rgba(251, 191, 36, 0.3);
        }

        /* حالات خاصة */
        .empty-state {
            text-align: center;
            padding: 60px;
            color: #9ca3af;
            font-size: 1.2em;
            background: rgba(255,255,255,0.02);
            border-radius: 30px;
            border: 2px dashed rgba(251, 191, 36, 0.2);
        }

        /* Scrollbar احترافية */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #0a0f1e;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #fbbf24, #f59e0b);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #f59e0b, #fbbf24);
        }

        @media (max-width: 768px) {
            .tournament-title {
                font-size: 2.8em;
            }
            
            .welcome-light {
                font-size: 1.6em;
            }
            
            .header h1 {
                font-size: 2em;
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .section-header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .criticisms-grid {
                grid-template-columns: 1fr;
            }
            
            .container {
                padding: 0 15px;
            }
            
            .add-criticism, .criticisms-section {
                padding: 25px;
            }
        }

        /* تحسينات إضافية */
        .stats-badge {
            background: rgba(251, 191, 36, 0.1);
            border-radius: 40px;
            padding: 8px 20px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border: 1px solid #fbbf2440;
            color: #fbbf24;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="tournament-title">
            دورة مركز شباب تندة
        </div>
        <div class="welcome-light">
            <span>منور</span> 🌙
        </div>
        <h1>🎯 <span>نَقْدُك</span> حَكَم 🎯</h1>
        <p class="ramadan-decoration">🌙 الدورة الرمضانية - الموسم الأول 🌙</p>
    </div>

    <div class="container">
        <!-- قسم إضافة نقد جديد -->
        <div class="add-criticism">
            <h2>⚽ أضف نقدك للحكم</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>رقم الماتش</label>
                    <input type="text" id="matchNumber" placeholder="مثال: ٥" value="٥">
                </div>
                <div class="form-group">
                    <label>نوع الانتقاد</label>
                    <select id="criticismType">
                        <option value="فكاهي">😄 فكاهي</option>
                        <option value="ساخر">😏 ساخر</option>
                        <option value="بناء">💪 بناء</option>
                        <option value="كلاسيك">👀 كلاسيك</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>نقدك</label>
                <textarea id="criticismText" placeholder="اكتب نقدك هنا..."></textarea>
            </div>
            <button class="btn-submit" onclick="addCriticism()">إضافة النقد</button>
        </div>

        <!-- قسم عرض الانتقادات -->
        <div class="criticisms-section">
            <div class="section-header">
                <h2>الانتقادات</h2>
                <div class="filter-buttons">
                    <button class="filter-btn active" onclick="filterCriticisms('الكل')">الكل</button>
                    <button class="filter-btn" onclick="filterCriticisms('فكاهي')">فكاهي</button>
                    <button class="filter-btn" onclick="filterCriticisms('ساخر')">ساخر</button>
                    <button class="filter-btn" onclick="filterCriticisms('بناء')">بناء</button>
                    <button class="filter-btn" onclick="filterCriticisms('كلاسيك')">كلاسيك</button>
                </div>
            </div>

            <div id="criticismsContainer" class="criticisms-grid">
                <!-- هنا هتظهر الانتقادات -->
            </div>
        </div>
    </div>

    <div class="footer">
        <p>جميع الانتقادات متاحة للجميع</p>
        <p class="tenda-signature">مركز شباب تندة 🏡</p>
        <p style="margin-top: 15px; font-size: 0.9em;">🌙 رمضان كريم 🌙</p>
    </div>

    <div id="toastMessage" class="toast-message">تمت الإضافة بنجاح</div>

    <script>
        // قاعدة البيانات المحلية
        let criticisms = [
            {
                id: 1,
                matchNumber: "١",
                type: "فكاهي",
                text: "الحكم شايف إن اللعبة بتتلعب بإيده ولا برجله؟",
                votes: { up: 15, down: 3 },
                userVote: null
            },
            {
                id: 2,
                matchNumber: "٣",
                type: "ساخر",
                text: "الحكم النهاردة معاه كارت أصفر وأحمر، وفي جيبه كمان كارت أبيض وأسلم!",
                votes: { up: 23, down: 5 },
                userVote: null
            },
            {
                id: 3,
                matchNumber: "٢",
                type: "بناء",
                text: "يا ريس، احنا هنا عشان نلعب ونفرح، فشوية تركيز مع اللعب من فضلك!",
                votes: { up: 9, down: 2 },
                userVote: null
            },
            {
                id: 4,
                matchNumber: "٤",
                type: "كلاسيك",
                text: "الحكم بيلعب بطريقة 'اللا توقّع'.. متعرفش إمتى هيحتسب خطأ!",
                votes: { up: 31, down: 7 },
                userVote: null
            }
        ];

        let currentFilter = 'الكل';

        // عرض الانتقادات
        function displayCriticisms() {
            const container = document.getElementById('criticismsContainer');
            
            let filteredCriticisms = criticisms;
            if (currentFilter !== 'الكل') {
                filteredCriticisms = criticisms.filter(c => c.type === currentFilter);
            }

            if (filteredCriticisms.length === 0) {
                container.innerHTML = '<div class="empty-state">لا توجد انتقادات حالياً</div>';
                return;
            }

            container.innerHTML = filteredCriticisms.map(criticism => `
                <div class="criticism-card">
                    <div class="card-header">
                        <span class="match-number">ماتش ${criticism.matchNumber}</span>
                        <span class="criticism-type">${criticism.type}</span>
                    </div>
                    <div class="criticism-text">${criticism.text}</div>
                    <div class="card-footer">
                        <span>🕒 منذ قليل</span>
                        <div class="votes">
                            <button class="vote-btn ${criticism.userVote === 'up' ? 'upvoted' : ''}" onclick="vote(${criticism.id}, 'up')">
                                👍 ${criticism.votes.up}
                            </button>
                            <button class="vote-btn ${criticism.userVote === 'down' ? 'downvoted' : ''}" onclick="vote(${criticism.id}, 'down')">
                                👎 ${criticism.votes.down}
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // إضافة نقد جديد
        function addCriticism() {
            const matchNumber = document.getElementById('matchNumber').value;
            const type = document.getElementById('criticismType').value;
            const text = document.getElementById('criticismText').value;

            if (!matchNumber || !text) {
                showToast('الرجاء إدخال رقم الماتش والنقد', 'error');
                return;
            }

            const newCriticism = {
                id: criticisms.length + 1,
                matchNumber: matchNumber,
                type: type,
                text: text,
                votes: { up: 0, down: 0 },
                userVote: null
            };

            criticisms.unshift(newCriticism);
            displayCriticisms();
            
            document.getElementById('matchNumber').value = '';
            document.getElementById('criticismText').value = '';
            
            showToast('تمت إضافة النقد بنجاح');
        }

        // التصويت
        function vote(id, voteType) {
            const criticism = criticisms.find(c => c.id === id);
            
            if (criticism.userVote === voteType) {
                criticism.votes[voteType]--;
                criticism.userVote = null;
            } else {
                if (criticism.userVote) {
                    criticism.votes[criticism.userVote]--;
                }
                criticism.votes[voteType]++;
                criticism.userVote = voteType;
            }
            
            displayCriticisms();
        }

        // تصفية الانتقادات
        function filterCriticisms(type) {
            currentFilter = type;
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.includes(type)) {
                    btn.classList.add('active');
                }
            });
            
            displayCriticisms();
        }

        // إظهار رسالة
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toastMessage');
            toast.textContent = message;
            
            if (type === 'error') {
                toast.style.background = 'linear-gradient(135deg, #ef4444, #dc2626)';
            } else {
                toast.style.background = 'linear-gradient(135deg, #1e2b3a, #0f172a)';
            }
            
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // تشغيل عند تحميل الصفحة
        document.addEventListener('DOMContentLoaded', displayCriticisms);
    </script>

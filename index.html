<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سمسومتي ❤️</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff4b7d,#ff9a9e,#fad0c4);
color:white;
text-align:center;
overflow:hidden;
}

/* الصفحات */
.page{
display:none;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
}

#p1{display:flex}

/* نص */
h1{
font-size:35px;
margin:15px;
}

/* زر */
button{
padding:12px 25px;
margin:10px;
border:none;
border-radius:25px;
font-size:18px;
cursor:pointer;
background:white;
color:#ff4b7d;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

/* زر لا */
#no{
background:transparent;
color:white;
border:2px solid white;
position:absolute;
}

/* قلوب */
.heart{
position:absolute;
width:20px;
height:20px;
background:red;
transform:rotate(45deg);
animation:up 6s linear infinite;
}

.heart:before,.heart:after{
content:"";
position:absolute;
width:20px;
height:20px;
background:red;
border-radius:50%;
}

.heart:before{top:-10px}
.heart:after{left:-10px}

@keyframes up{
0%{transform:translateY(100vh) rotate(45deg)}
100%{transform:translateY(-10vh) rotate(45deg)}
}
</style>
</head>

<body>

<!-- صفحة 1 -->
<div id="p1" class="page">
<h1>سمسومتي ❤️</h1>
<button onclick="go(2)">ابدئي 💖</button>
</div>

<!-- صفحة 2 -->
<div id="p2" class="page">
<h1>بتحبيني؟ 😏</h1>
<button onclick="go(3)">اه 💖</button>
<button id="no" onmouseover="هرب()">لا 😹</button>
</div>

<!-- صفحة 3 -->
<div id="p3" class="page">
<h1 id="text"></h1>
<button onclick="nextMsg()">كملي 💌</button>
</div>

<script>

/* التنقل */
function go(n){
document.querySelectorAll(".page").forEach(p=>p.style.display="none");
document.getElementById("p"+n).style.display="flex";

if(n==3){
showMessage();
hearts();
}
}

/* الرسائل */
let messages=[
"أنا بحبك يا سمسومتي ❤️",
"انتي أجمل حاجة حصلتلي 💖",
"بضحك لما بشوفك 😹",
"وبحب كل تفاصيلك 😍",
"وعمري ما هسيبك ❤️🔥"
];

let index=0;

/* كتابة */
function showMessage(){
let text=messages[index];
let i=0;
let el=document.getElementById("text");
el.innerHTML="";

function write(){
if(i<text.length){
el.innerHTML+=text[i];
i++;
setTimeout(write,50);
}
}
write();
}

/* رسالة تانية */
function nextMsg(){
index++;
if(index>=messages.length){
index=0;
}
showMessage();
}

/* قلوب */
function hearts(){
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
},300);
}

/* زر بيهرب */
function هرب(){
let b=document.getElementById("no");
b.style.left=Math.random()*80+"%";
b.style.top=Math.random()*80+"%";
}

</script>

</body>
</html>
